services:
  - type: web
    name: devloop-ai
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start --workspace api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_API_KEY
        sync: false
